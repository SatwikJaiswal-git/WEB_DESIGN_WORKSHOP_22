<!DOCTYPE html>
<html>
  <head>
    <title>HTML CSS REVIEW</title>
    <style>
      /* this is a class selector*/
      .red_button{
        background-color:red;
        color:white;
        border:none;
      }
      .yellow_button{
        background-color: yellow;
      }
      .orange_button{
        background-color:orange;
        color:rgb(28, 9, 13);
        border:none;
      }
    </style>
  </head>
  <body>
    <button class="red_button">
      CLICK ME
    </button>
    <button class="orange_button">Click me</button>
    <p>
      Hey What What are you waiting for 
    </p>
    <button title="What are you waiting for" class="yellow_button" 
    onclick="alert('Good Job')"> <!--onlclick attribute used to write js code in  particular element and works when clicking-->
    Click it
    </button>
    <script>
      // Single line comment
      /*Multiple
      line
      comment*/
      //alert('hello');
      console.log(2+2);
      console.log('some' + 'text');
    </script>
  </body>
</html>
