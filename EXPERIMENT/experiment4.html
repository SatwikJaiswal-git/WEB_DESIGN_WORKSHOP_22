<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-3">🎓 Student Result Calculator</h2>
                        <p class="text-center text-muted">
                            Enter number of subjects and calculate your result
                        </p>

                        <div class="mb-3">
                            <label class="form-label">Number of Subjects</label>
                            <input 
                                type="number" 
                                id="numSubjects" 
                                class="form-control" 
                                placeholder="Enter number of subjects"
                                min="1" 
                                max="20">
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary" onclick="calculateResult()">
                                Calculate Result
                            </button>
                        </div>

                        <div id="resultBox" class="mt-4 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Internal JavaScript -->
    <script>
        function calculateResult() {
            // Step 1: Get number of subjects
            let numSubjects = parseInt(document.getElementById("numSubjects").value);

            // Step 2: Validate input
            if (isNaN(numSubjects) || numSubjects <= 0) {
                alert("Please enter a valid number of subjects (greater than 0).");
                return;
            }

            // Step 3: Collect marks using a loop
            let totalMarks = 0;
            let marksArray = [];

            for (let i = 1; i <= numSubjects; i++) {
                let mark = parseFloat(prompt(`Enter marks for Subject ${i} (out of 100):`));

                if (isNaN(mark) || mark < 0 || mark > 100) {
                    alert(`Invalid marks for Subject ${i}. Please enter a value between 0 and 100.`);
                    return;
                }

                marksArray.push(mark);
                totalMarks += mark;
            }

            // Step 4: Calculate average
            let averageMarks = totalMarks / numSubjects;
            averageMarks = parseFloat(averageMarks.toFixed(2));

            // Step 5: Determine grade
            let grade;
            let gradeClass;

            if (averageMarks >= 90) {
                grade = "A";
                gradeClass = "grade-A";
            } else if (averageMarks >= 75) {
                grade = "B";
                gradeClass = "grade-B";
            } else if (averageMarks >= 60) {
                grade = "C";
                gradeClass = "grade-C";
            } else if (averageMarks >= 40) {
                grade = "D";
                gradeClass = "grade-D";
            } else {
                grade = "F";
                gradeClass = "grade-F";
            }

            // Step 6: Determine pass or fail
            let resultStatus;
            let resultClass;

            if (averageMarks >= 40) {
                resultStatus = "PASS";
                resultClass = "pass";
            } else {
                resultStatus = "FAIL";
                resultClass = "fail";
            }

            // Step 7: Display results on the webpage
            let resultBox = document.getElementById("resultBox");

            resultBox.innerHTML = `
                <h2>📊 Result Summary</h2>
                <div class="result-item">
                    <span>Number of Subjects</span>
                    <span class="result-value">${numSubjects}</span>
                </div>
                <div class="result-item">
                    <span>Total Marks</span>
                    <span class="result-value">${totalMarks}</span>
                </div>
                <div class="result-item">
                    <span>Average Marks</span>
                    <span class="result-value">${averageMarks} / 100</span>
                </div>
                <div class="result-item">
                    <span>Grade</span>
                    <span class="result-value">
                        <span class="grade-badge ${gradeClass}">${grade}</span>
                    </span>
                </div>
                <div class="result-item">
                    <span>Result</span>
                    <span class="result-value">
                        <span class="pass-badge ${resultClass}">${resultStatus}</span>
                    </span>
                </div>
            `;

            resultBox.classList.remove("d-none");
        }
    </script>

    <!-- Optional: You can add custom CSS for better styling of badges -->
    <style>
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #444;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .grade-badge, .pass-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .grade-A { background-color: #28a745; color: white; }
        .grade-B { background-color: #17a2b8; color: white; }
        .grade-C { background-color: #ffc107; color: black; }
        .grade-D { background-color: #fd7e14; color: white; }
        .grade-F { background-color: #dc3545; color: white; }
        
        .pass { background-color: #28a745; color: white; }
        .fail { background-color: #dc3545; color: white; }
    </style>
</body>
</html>
